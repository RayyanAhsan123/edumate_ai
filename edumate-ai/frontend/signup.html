<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edumate AI — Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-lg p-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold brand-title">Edumate <span class="text-primary">AI</span></h2>
      <p class="text-muted">Create your student account</p>
    </div>

    <div id="alert-box"></div>

    <form id="signup-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill text-primary"></i></span>
          <input type="text" id="name" class="form-control" placeholder="Ali Raza" required />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill text-primary"></i></span>
          <input type="email" id="email" class="form-control" placeholder="you@university.edu" required />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6" />
        </div>
      </div>

      <div class="mb-4">
        <div class="form-check form-switch p-3 sign-lang-card rounded">
          <input class="form-check-input" type="checkbox" id="sign_language" role="switch" />
          <label class="form-check-label ms-2" for="sign_language">
            <i class="bi bi-hand-index-thumb-fill text-primary me-1"></i>
            <strong>I use Sign Language</strong>
            <br />
            <small class="text-muted">Enable sign language support in video conferencing</small>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="signup-btn">
        <span id="btn-text"><i class="bi bi-person-plus-fill me-1"></i> Create Account</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>

    <hr class="my-3" />
    <p class="text-center mb-0">
      Already have an account?
      <a href="login.html" class="text-primary fw-semibold">Login here</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById("signup-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const btn = document.getElementById("signup-btn");
    btn.disabled = true;
    document.getElementById("btn-text").classList.add("d-none");
    document.getElementById("btn-spinner").classList.remove("d-none");

    const res = await api.post("/auth/signup", {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
      is_sign_language: document.getElementById("sign_language").checked,
    });

    btn.disabled = false;
    document.getElementById("btn-text").classList.remove("d-none");
    document.getElementById("btn-spinner").classList.add("d-none");

    if (res.error) {
      showAlert(res.error, "danger");
    } else {
      localStorage.setItem("user", JSON.stringify(res.user));
      window.location.href = "personality.html";
    }
  });

  function showAlert(msg, type) {
    document.getElementById("alert-box").innerHTML =
      `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>`;
  }
</script>
</body>
</html>
