<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edumate AI — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-lg p-4">
    <div class="text-center mb-4">
      <img src="css/logo.svg" alt="Edumate AI" width="60" onerror="this.style.display='none'" />
      <h2 class="fw-bold mt-2 brand-title">Edumate <span class="text-primary">AI</span></h2>
      <p class="text-muted">Smart Learning Management System</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill text-primary"></i></span>
          <input type="email" id="email" class="form-control" placeholder="you@university.edu" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Your password" required />
          <button class="btn btn-outline-secondary" type="button" id="toggle-pass">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
        <span id="btn-text"><i class="bi bi-box-arrow-in-right me-1"></i> Login</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>

    <hr class="my-3" />
    <p class="text-center mb-0">
      Don't have an account?
      <a href="signup.html" class="text-primary fw-semibold">Sign up here</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  // Toggle password visibility
  document.getElementById("toggle-pass").addEventListener("click", function () {
    const inp = document.getElementById("password");
    const icon = this.querySelector("i");
    if (inp.type === "password") {
      inp.type = "text";
      icon.className = "bi bi-eye-slash";
    } else {
      inp.type = "password";
      icon.className = "bi bi-eye";
    }
  });

  document.getElementById("login-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const btn = document.getElementById("login-btn");
    const text = document.getElementById("btn-text");
    const spinner = document.getElementById("btn-spinner");

    btn.disabled = true;
    text.classList.add("d-none");
    spinner.classList.remove("d-none");

    const res = await api.post("/auth/login", {
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
    });

    btn.disabled = false;
    text.classList.remove("d-none");
    spinner.classList.add("d-none");

    if (res.error) {
      showAlert(res.error, "danger");
    } else {
      localStorage.setItem("user", JSON.stringify(res.user));
      // Redirect based on personality test completion
      if (!res.user.personality_type) {
        window.location.href = "personality.html";
      } else {
        window.location.href = "dashboard.html";
      }
    }
  });

  function showAlert(msg, type) {
    document.getElementById("alert-box").innerHTML =
      `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${msg}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>`;
  }
</script>
</body>
</html>
