<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edumate AI — AI Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4 sticky-top shadow">
  <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>Edumate AI</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-house-fill me-1"></i>Home</a></li>
      <li class="nav-item"><a class="nav-link" href="group.html"><i class="bi bi-people-fill me-1"></i>My Group</a></li>
      <li class="nav-item"><a class="nav-link" href="leaderboard.html"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
      <li class="nav-item"><a class="nav-link active" href="chatbot.html"><i class="bi bi-robot me-1"></i>AI Tutor</a></li>
      <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow">
        <div class="card-header d-flex align-items-center gap-3">
          <div class="bot-avatar">
            <i class="bi bi-robot text-white fs-4"></i>
          </div>
          <div>
            <div class="fw-bold">Edumate AI Tutor</div>
            <div class="text-muted small"><span class="text-success">●</span> Online — Ask me anything about your studies</div>
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-container" id="chat-box">
          <div class="d-flex gap-2 mb-3">
            <div class="bot-avatar-sm"><i class="bi bi-robot text-white"></i></div>
            <div>
              <div class="chat-bubble bot-bubble">
                👋 Hi! I'm your AI Tutor. Ask me about programming, algorithms, data structures, math, or anything related to your studies!
              </div>
              <div class="chat-time ms-1">Just now</div>
            </div>
          </div>
        </div>

        <!-- Suggested Questions -->
        <div class="px-3 py-2 border-top" id="suggestions">
          <div class="text-muted small mb-2">Suggested questions:</div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-sm btn-outline-primary" onclick="sendSuggestion(this)">What is OOP?</button>
            <button class="btn btn-sm btn-outline-primary" onclick="sendSuggestion(this)">Explain recursion</button>
            <button class="btn btn-sm btn-outline-primary" onclick="sendSuggestion(this)">What is a linked list?</button>
            <button class="btn btn-sm btn-outline-primary" onclick="sendSuggestion(this)">How do I earn more points?</button>
            <button class="btn btn-sm btn-outline-primary" onclick="sendSuggestion(this)">Explain sorting algorithms</button>
          </div>
        </div>

        <!-- Input Area -->
        <div class="card-footer p-3">
          <div class="input-group">
            <input type="text" id="msg-input" class="form-control"
              placeholder="Type your question here..."
              onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="btn btn-primary px-3" onclick="sendMessage()" id="send-btn">
              <i class="bi bi-send-fill"></i>
            </button>
          </div>
          <div class="text-muted small mt-1 text-center">
            <i class="bi bi-shield-check me-1"></i>Powered by Edumate AI
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  const user = requireLogin();

  function sendSuggestion(btn) {
    document.getElementById("msg-input").value = btn.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const msg = input.value.trim();
    if (!msg) return;

    input.value = "";
    document.getElementById("send-btn").disabled = true;
    document.getElementById("suggestions").style.display = "none";

    appendMessage(msg, "user");
    appendTyping();

    const res = await api.post("/chatbot/ask", { message: msg });

    removeTyping();
    document.getElementById("send-btn").disabled = false;

    if (res.error) {
      appendMessage("Sorry, I couldn't connect. Please make sure the server is running.", "bot");
    } else {
      appendMessage(res.response, "bot");
    }

    scrollBottom();
  }

  function appendMessage(text, who) {
    const box = document.getElementById("chat-box");
    const time = new Date().toLocaleTimeString("en-PK", { hour: "2-digit", minute: "2-digit" });

    if (who === "user") {
      box.innerHTML += `
        <div class="d-flex justify-content-end mb-3">
          <div>
            <div class="chat-bubble user-bubble">${escHtml(text)}</div>
            <div class="chat-time text-end me-1">${time}</div>
          </div>
        </div>`;
    } else {
      box.innerHTML += `
        <div class="d-flex gap-2 mb-3">
          <div class="bot-avatar-sm flex-shrink-0"><i class="bi bi-robot text-white"></i></div>
          <div>
            <div class="chat-bubble bot-bubble">${escHtml(text)}</div>
            <div class="chat-time ms-1">${time}</div>
          </div>
        </div>`;
    }
    scrollBottom();
  }

  function appendTyping() {
    const box = document.getElementById("chat-box");
    box.innerHTML += `
      <div id="typing-indicator" class="d-flex gap-2 mb-3">
        <div class="bot-avatar-sm flex-shrink-0"><i class="bi bi-robot text-white"></i></div>
        <div class="chat-bubble bot-bubble">
          <span class="typing-dot">●</span>
          <span class="typing-dot">●</span>
          <span class="typing-dot">●</span>
        </div>
      </div>`;
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  function scrollBottom() {
    const box = document.getElementById("chat-box");
    box.scrollTop = box.scrollHeight;
  }

  function escHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }

  async function loadHistory() {
    const res = await api.get("/chatbot/history");
    if (res.history && res.history.length > 0) {
      document.getElementById("suggestions").style.display = "none";
      res.history.forEach(m => {
        appendMessage(m.you, "user");
        if (m.bot) appendMessage(m.bot, "bot");
      });
    }
  }

  async function logout() {
    await api.post("/auth/logout", {});
    localStorage.clear();
    window.location.href = "login.html";
  }

  loadHistory();
  checkApiStatus();

  async function checkApiStatus() {
    const res = await api.get("/chatbot/status");
    if (res && !res.api_key_set) {
      const box = document.getElementById("chat-box");
      box.innerHTML = `
        <div class="alert alert-warning mx-2 mt-2 mb-0">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <strong>API Key Set nahi hai!</strong><br>
          <small>
            <b>backend/config.py</b> file kholo aur <code>ANTHROPIC_API_KEY</code> mein apni key likho,
            phir server restart karo.<br>
            Abhi basic answers mil rahe hain.
          </small>
        </div>` + box.innerHTML;
    }
  }
</script>

<style>
.bot-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.bot-avatar-sm {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 0.8rem;
}
.typing-dot {
  animation: blink 1.2s infinite;
  margin: 0 1px;
  font-size: 0.7rem;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
</style>
</body>
</html>
