<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edumate AI — Personality Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>Edumate AI</span>
  <span class="text-white opacity-75" id="nav-user"></span>
</nav>

<div class="container py-5" id="test-section">
  <div class="text-center mb-5">
    <h2 class="fw-bold">Personality Test</h2>
    <p class="text-muted">Answer 20 questions honestly. This helps us build your perfect study group.</p>
    <!-- Progress bar -->
    <div class="progress mt-3" style="height:10px; max-width:500px; margin:auto;">
      <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" id="progress-bar" style="width:0%"></div>
    </div>
    <small class="text-muted mt-1 d-block" id="progress-text">Question 1 of 20</small>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow p-4" id="question-card">
        <h5 class="mb-4 fw-semibold" id="question-text">Loading...</h5>
        <div class="d-grid gap-3" id="options-container"></div>
        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-outline-secondary" id="prev-btn" onclick="prevQ()" disabled>
            <i class="bi bi-arrow-left"></i> Previous
          </button>
          <button class="btn btn-primary" id="next-btn" onclick="nextQ()" disabled>
            Next <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Result Section (hidden initially) -->
<div class="container py-5 d-none" id="result-section">
  <div class="row justify-content-center">
    <div class="col-md-7 text-center">
      <div class="card shadow p-5">
        <div class="personality-badge mb-4">
          <span id="ptype-badge" class="display-4 fw-bold text-primary"></span>
        </div>
        <h4 id="ptype-desc" class="mb-3"></h4>
        <hr />
        <div id="group-result" class="alert alert-success mt-3"></div>
        <a href="dashboard.html" class="btn btn-primary btn-lg mt-3 px-5">
          <i class="bi bi-house-fill me-2"></i>Go to Dashboard
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem("user") || "{}");
  document.getElementById("nav-user").textContent = user.name || "";

  let questions = [];
  let answers = {};
  let current = 0;

  async function loadQuestions() {
    const res = await api.get("/personality/questions");
    questions = res.questions || [];
    showQuestion(0);
  }

  function showQuestion(idx) {
    if (idx >= questions.length) return;
    const q = questions[idx];
    document.getElementById("question-text").textContent = `${idx + 1}. ${q.text}`;
    document.getElementById("progress-bar").style.width = `${((idx + 1) / questions.length) * 100}%`;
    document.getElementById("progress-text").textContent = `Question ${idx + 1} of ${questions.length}`;

    const container = document.getElementById("options-container");
    const savedAns = answers[q.id];
    container.innerHTML = `
      <button onclick="selectAnswer('${q.id}', 'a')"
        class="btn option-btn ${savedAns === 'a' ? 'btn-primary' : 'btn-outline-primary'} text-start py-3 px-4">
        <span class="option-letter me-2">A</span> ${q.a}
      </button>
      <button onclick="selectAnswer('${q.id}', 'b')"
        class="btn option-btn ${savedAns === 'b' ? 'btn-primary' : 'btn-outline-primary'} text-start py-3 px-4">
        <span class="option-letter me-2">B</span> ${q.b}
      </button>
    `;

    document.getElementById("prev-btn").disabled = idx === 0;
    document.getElementById("next-btn").disabled = !savedAns;
    const isLast = idx === questions.length - 1;
    document.getElementById("next-btn").innerHTML = isLast
      ? '<i class="bi bi-check-lg me-1"></i> Submit'
      : 'Next <i class="bi bi-arrow-right"></i>';
  }

  function selectAnswer(qid, ans) {
    answers[qid] = ans;
    showQuestion(current);
  }

  function nextQ() {
    if (current === questions.length - 1) {
      submitTest();
    } else {
      current++;
      showQuestion(current);
    }
  }

  function prevQ() {
    if (current > 0) {
      current--;
      showQuestion(current);
    }
  }

  async function submitTest() {
    document.getElementById("next-btn").disabled = true;
    document.getElementById("next-btn").innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';

    const res = await api.post("/personality/submit", { answers });

    if (res.error) {
      alert(res.error);
      return;
    }

    // Update local user
    const u = JSON.parse(localStorage.getItem("user") || "{}");
    u.personality_type = res.personality_type;
    u.is_leader = res.is_leader;
    localStorage.setItem("user", JSON.stringify(u));

    document.getElementById("test-section").classList.add("d-none");
    document.getElementById("result-section").classList.remove("d-none");
    document.getElementById("ptype-badge").textContent = res.personality_type;
    document.getElementById("ptype-desc").textContent = res.description;

    const g = res.group;
    document.getElementById("group-result").innerHTML = g
      ? `<i class="bi bi-people-fill me-2"></i> You've been assigned to <strong>${g.name}</strong>!
         ${res.is_leader ? '<br><span class="badge bg-warning text-dark mt-1"><i class="bi bi-star-fill me-1"></i>You are the Group Leader!</span>' : ''}`
      : "Group assignment pending. Please wait.";
  }

  loadQuestions();
</script>
</body>
</html>
