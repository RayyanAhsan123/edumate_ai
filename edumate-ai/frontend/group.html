<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edumate AI — My Group</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4 sticky-top shadow">
  <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>Edumate AI</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-house-fill me-1"></i>Home</a></li>
      <li class="nav-item"><a class="nav-link active" href="group.html"><i class="bi bi-people-fill me-1"></i>My Group</a></li>
      <li class="nav-item"><a class="nav-link" href="leaderboard.html"><i class="bi bi-trophy-fill me-1"></i>Leaderboard</a></li>
      <li class="nav-item"><a class="nav-link" href="chatbot.html"><i class="bi bi-robot me-1"></i>AI Tutor</a></li>
      <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container py-4">
  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Loading your group...</p>
  </div>

  <div id="main-content" class="d-none">
    <!-- Group Header -->
    <div class="welcome-banner card p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h3 class="fw-bold mb-1" id="group-name">Group —</h3>
          <span id="leader-badge-area"></span>
        </div>
        <div class="text-end">
          <div class="fw-bold fs-5" id="member-count">— members</div>
          <div class="opacity-75 small">Personality: <span id="group-personality">—</span></div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Members -->
      <div class="col-md-5">
        <div class="card h-100">
          <div class="card-header fw-semibold">
            <i class="bi bi-people-fill text-primary me-2"></i>Group Members
          </div>
          <div class="card-body" id="members-list"></div>
        </div>
      </div>

      <!-- Meetings Panel -->
      <div class="col-md-7">
        <!-- Schedule Meeting (leader only) -->
        <div id="schedule-panel" class="card mb-4 d-none">
          <div class="card-header fw-semibold">
            <i class="bi bi-calendar-plus-fill text-success me-2"></i>Schedule a Meeting
          </div>
          <div class="card-body">
            <div id="schedule-alert"></div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Meeting Title</label>
              <input type="text" id="meeting-title" class="form-control" placeholder="e.g. Week 3 Study Session" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Date & Time</label>
              <input type="datetime-local" id="meeting-dt" class="form-control" />
            </div>
            <button class="btn btn-success px-4" onclick="scheduleMeeting()">
              <i class="bi bi-calendar-check-fill me-1"></i> Schedule Meeting
            </button>
          </div>
        </div>

        <!-- Meetings List -->
        <div class="card">
          <div class="card-header fw-semibold">
            <i class="bi bi-camera-video-fill text-primary me-2"></i>All Meetings
          </div>
          <div class="card-body" id="meetings-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- No group -->
  <div id="no-group" class="d-none text-center py-5">
    <i class="bi bi-people fs-1 text-muted d-block mb-3"></i>
    <h5>You haven't been assigned a group yet</h5>
    <p class="text-muted">Complete the personality test first.</p>
    <a href="personality.html" class="btn btn-primary">Take Personality Test</a>
  </div>
</div>

<a href="chatbot.html" class="chat-fab btn btn-primary rounded-circle shadow" title="AI Tutor">
  <i class="bi bi-robot fs-4"></i>
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  const user = requireLogin();
  let isLeader = false;

  async function loadGroup() {
    const res = await api.get("/groups/my-group");
    document.getElementById("loading").classList.add("d-none");

    if (res.error || !res.group) {
      document.getElementById("no-group").classList.remove("d-none");
      return;
    }

    document.getElementById("main-content").classList.remove("d-none");
    isLeader = res.is_leader;

    document.getElementById("group-name").textContent = res.group.name;
    document.getElementById("member-count").textContent = res.members.length + " members";
    document.getElementById("group-personality").textContent = res.group.personality_focus || "Mixed";

    if (isLeader) {
      document.getElementById("leader-badge-area").innerHTML =
        `<span class="leader-badge"><i class="bi bi-star-fill me-1"></i>You are the Leader</span>`;
      document.getElementById("schedule-panel").classList.remove("d-none");
    }

    // Members
    const ml = document.getElementById("members-list");
    ml.innerHTML = res.members.map(m => `
      <div class="member-card p-3 mb-2 d-flex align-items-center gap-3">
        <div class="avatar-circle">${m.name[0].toUpperCase()}</div>
        <div class="flex-grow-1">
          <div class="fw-semibold">${m.name}
            ${m.is_leader ? '<span class="leader-badge ms-1">Leader</span>' : ''}
            ${m.is_sign_language ? '<i class="bi bi-hand-index-thumb-fill text-primary ms-1" title="Sign Language User"></i>' : ''}
          </div>
          <div class="text-muted small">${m.personality_type || 'Test pending'} &nbsp;|&nbsp; ${m.total_points} pts</div>
        </div>
      </div>
    `).join("");

    // Meetings
    const meetDiv = document.getElementById("meetings-list");
    if (!res.meetings || res.meetings.length === 0) {
      meetDiv.innerHTML = `<div class="text-muted text-center py-3"><i class="bi bi-calendar-x fs-3 d-block mb-2"></i>No meetings scheduled yet</div>`;
    } else {
      meetDiv.innerHTML = res.meetings.map(m => {
        const isPast = new Date(m.scheduled_at) < new Date();
        return `
        <div class="meeting-item d-flex align-items-center justify-content-between mb-2 p-2 rounded border ${isPast ? 'opacity-50' : ''}">
          <div>
            <div class="fw-semibold">${m.title}</div>
            <div class="text-muted small"><i class="bi bi-clock me-1"></i>${m.scheduled_at}</div>
          </div>
          ${!isPast ? `
          <button class="btn btn-sm btn-success fw-semibold"
             onclick="goToMeeting(${m.id}, '${m.room_url}', '${m.title}')">
            <i class="bi bi-camera-video-fill me-1"></i>Join Meeting
          </button>` : `<span class="badge bg-secondary">Past</span>`}
        </div>`;
      }).join("");
    }
  }

  async function scheduleMeeting() {
    const title = document.getElementById("meeting-title").value.trim();
    const dt = document.getElementById("meeting-dt").value;
    if (!title || !dt) {
      document.getElementById("schedule-alert").innerHTML =
        `<div class="alert alert-warning py-2">Please fill in both fields.</div>`;
      return;
    }
    const res = await api.post("/meetings/schedule", { title, scheduled_at: dt });
    if (res.error) {
      document.getElementById("schedule-alert").innerHTML =
        `<div class="alert alert-danger py-2">${res.error}</div>`;
    } else {
      showToast("Meeting scheduled! Members can now join.", "success");
      document.getElementById("meeting-title").value = "";
      document.getElementById("meeting-dt").value = "";
      loadGroup();
    }
  }

  function goToMeeting(meetingId, roomUrl, title) {
    const roomName = roomUrl.replace("https://meet.jit.si/", "");
    const grpName  = document.getElementById("group-name").textContent;
    const url = `meeting.html?id=${meetingId}&room=${encodeURIComponent(roomName)}&title=${encodeURIComponent(title)}&group=${encodeURIComponent(grpName)}`;
    window.location.href = url;
  }

  async function joinAndEarn(meetingId) {
    const res = await api.post(`/meetings/join/${meetingId}`, {});
    if (res.message) showToast(res.message, "success");
  }

  async function logout() {
    await api.post("/auth/logout", {});
    localStorage.clear();
    window.location.href = "login.html";
  }

  loadGroup();
</script>

<style>
.avatar-circle {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  color: white;
  font-weight: bold;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
</style>
</body>
</html>
